<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Онлайн Трансляция</title>
    <link rel="stylesheet" href="stream.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  </head>
  <body>
    <div class="main">
      <div class="player-container">
        <div class="header-row">
          <h1>Прямой эфир</h1>
          <span class="badge-live">LIVE</span>
          <span id="stream-status">Подключение...</span>
        </div>

        <div class="video-wrapper">
          <video id="video" controls autoplay muted playsinline></video>
        </div>
      </div>
    </div>

    <div class="chat-sidebar">
      <iframe src="https://www.twitch.tv/embed/sapushka_/chat?parent=sapa-tv.ru&amp;darkpopout" allowfullscreen sandbox="allow-modals allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms"></iframe>
    </div>

    <script src="stream.js"></script>
  </body>
</html>
